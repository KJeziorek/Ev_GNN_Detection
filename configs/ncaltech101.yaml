# NCaltech101 dataset & training configuration

data:
  data_dir: /home/imperator/Datasets/NCaltech101
  sensor_width: 240
  sensor_height: 180
  num_events: 50000
  train_ratio: 0.7
  val_ratio: 0.15
  seed: 42

graph:
  radius_x: 5
  radius_y: 5
  radius_t: 0.001

model:
  num_classes: 100           # 101 classes minus BACKGROUND_Google
  spatial_range: [240, 180]

training:
  batch_size: 4
  num_workers: 4
  epochs: 200
  learning_rate: 0.001
  weight_decay: 0.0005
  patience: 20

logging:
  log_dir: logs/ncaltech101
  checkpoint_dir: checkpoints/ncaltech101
  save_every: 10

device: cuda
