# NCaltech101 dataset & training configuration

data:
  data_dir: /home/imperator/Datasets/NCaltech101
  sensor_width: 240
  sensor_height: 180
  num_events: 50000
  sample_len: 100000
  slice_method: mid_by_time  # first_by_time, last_by_time, first_by_count, last_by_count
  train_ratio: 0.7
  val_ratio: 0.15
  seed: 42

norm:
  norm_w: 240
  norm_h: 180
  norm_t: 1000

augmentation:
  hflip_p: 0.5
  crop_size: [0.75, 0.75]
  crop_p: 0.2
  zoom_range: [1.0, 1.5]
  zoom_subsample: true
  translate_size: [0.1, 0.1]

graph:
  radius_x: 5
  radius_y: 5
  radius_t: 1

model:
  num_classes: 100
  spatial_range: [240, 180]

training:
  batch_size: 8
  num_workers: 4
  epochs: 200
  learning_rate: 0.001
  weight_decay: 0.0005
  patience: 20

logging:
  log_dir: logs/ncaltech101
  checkpoint_dir: checkpoints/ncaltech101
  save_every: 10

device: cuda
