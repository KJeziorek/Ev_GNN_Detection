# Default training configuration

data:
  raw_dir: data/raw
  processed_dir: data/processed
  splits_dir: data/splits
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

model:
  name: GCN               # GCN, GAT, GraphSAGE, GIN
  in_channels: 16
  hidden_channels: 64
  out_channels: 2          # number of classes
  num_layers: 3
  dropout: 0.5

training:
  seed: 42
  epochs: 200
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0005
  patience: 20             # early stopping patience
  scheduler:
    name: ReduceLROnPlateau
    factor: 0.5
    patience: 10

logging:
  log_dir: logs
  checkpoint_dir: checkpoints
  save_every: 10           # save checkpoint every N epochs

device: cuda               # cuda or cpu
